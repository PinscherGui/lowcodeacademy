<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard do Estudante | Low Academy</title>
    <link rel="preconnect" href="https://wmgsdgtqbssjbgmmcomr.supabase.co" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container d-flex justify-between align-center" style="padding: 0;">
            <div class="logo">⚡ Low <span>Academy</span></div>
            <div class="d-flex align-center gap-2">
                <span id="user-name" style="font-size: 0.95rem;">Carregando...</span>
                <span class="status-badge" style="background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">Estudante</span>
                <button id="btn-logout" class="btn btn-outline" style="padding: 0.5rem 1rem; width: auto;">Sair</button>
            </div>
        </div>
    </nav>

    <main class="container mt-4 animate-fade-in">
        <div class="glass-panel mb-4">
            <h2>📝 Nova Solicitação</h2>
            <p class="text-muted mb-4">Preencha os detalhes abaixo para enviar uma solicitação para a coordenação.</p>
            
            <form id="new-req-form">
                <div class="form-group">
                    <label for="req-title">Título do Pedido</label>
                    <input type="text" id="req-title" placeholder="Ex: Trancamento de Matrícula" required>
                </div>
                <div class="form-group">
                    <label for="req-desc">Descrição Detalhada</label>
                    <textarea id="req-desc" rows="4" placeholder="Explique resumidamente sua necessidade..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary mt-1" style="width: auto;">Enviar Solicitação</button>
            </form>
        </div>

        <div class="glass-panel">
            <h2>📜 Minhas Solicitações</h2>
            <div id="req-list" class="request-list mt-4">
                <p>Buscando histórico...</p>
            </div>
        </div>
    </main>

    <script type="module" src="js/student.js"></script>

</body>
</html>
